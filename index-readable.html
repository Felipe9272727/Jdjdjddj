import { useEffect, useRef } from "react";
var LiminalAudioEngine = ({ doorTrigger, audioContext, muted, nightMode }) => {
  const lobbyGainRef = useRef(null);
  const masterGainRef = useRef(null);
  const lobbyReadyRef = useRef(false);
  const sourceRef = useRef(null);
  const barneySourceRef = useRef(null);
  const barneyBufferRef = useRef(null);
  const barneyGainRef = useRef(null);
  const barneyFilterRef = useRef(null);
  const crossfadeRef = useRef({ active: false, startTime: 0, duration: 3, from: "lobby", to: "elevator" });
  const tracksRef = useRef({
    lobby: { active: true, volume: 1, nextNoteTime: 0, beatCount: 0 },
    elevator: { active: false, volume: 0, nextNoteTime: 0, beatCount: 0 }
  });
  const distortModeRef = useRef(false);
  const schedulerTimerRef = useRef(null);
  useEffect(() => {
    distortModeRef.current = !!nightMode;
  }, [nightMode]);
  const setupReverb = (ctx, destination) => {
    const convolver = ctx.createConvolver();
    const length = ctx.sampleRate * 1.5;
    const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
    for (let i = 0; i < length; i++) {
      const n = i / length;
      const env = Math.pow(1 - n, 3);
      impulse.getChannelData(0)[i] = (Math.random() * 2 - 1) * env;
      impulse.getChannelData(1)[i] = (Math.random() * 2 - 1) * env;
    }
    convolver.buffer = impulse;
    const wetGain = ctx.createGain();
    wetGain.gain.value = 0.08;
    const dryGain = ctx.createGain();
    dryGain.gain.value = 1;
    const input = ctx.createGain();
    input.connect(convolver);
    convolver.connect(wetGain);
    input.connect(dryGain);
    wetGain.connect(destination);
    dryGain.connect(destination);
    return input;
  };
  const playDoorCloseSound = (ctx, dest) => {
    const t = ctx.currentTime;
    const dingOsc = ctx.createOscillator();
    dingOsc.frequency.setValueAtTime(784, t);
    const dingGain = ctx.createGain();
    dingGain.gain.setValueAtTime(0.1, t);
    dingGain.gain.exponentialRampToValueAtTime(1e-3, t + 2);
    dingOsc.connect(dingGain);
    dingGain.connect(dest);
    dingOsc.start(t);
    dingOsc.stop(t + 2);
    const motorOsc = ctx.createOscillator();
    motorOsc.type = "sawtooth";
    motorOsc.frequency.setValueAtTime(50, t + 0.2);
    motorOsc.frequency.linearRampToValueAtTime(40, t + 1.2);
    const motorGain = ctx.createGain();
    motorGain.gain.setValueAtTime(0, t + 0.2);
    motorGain.gain.linearRampToValueAtTime(0.05, t + 0.3);
    motorGain.gain.linearRampToValueAtTime(0, t + 1.2);
    const motorFilter = ctx.createBiquadFilter();
    motorFilter.type = "lowpass";
    motorFilter.frequency.value = 200;
    motorOsc.connect(motorFilter);
    motorFilter.connect(motorGain);
    motorGain.connect(dest);
    motorOsc.start(t + 0.2);
    motorOsc.stop(t + 1.2);
    const thudOsc = ctx.createOscillator();
    thudOsc.type = "sine";
    thudOsc.frequency.setValueAtTime(60, t + 1.1);
    thudOsc.frequency.exponentialRampToValueAtTime(20, t + 1.3);
    const thudGain = ctx.createGain();
    thudGain.gain.setValueAtTime(0, t + 1.1);
    thudGain.gain.linearRampToValueAtTime(0.2, t + 1.15);
    thudGain.gain.exponentialRampToValueAtTime(1e-3, t + 1.4);
    thudOsc.connect(thudGain);
    thudGain.connect(dest);
    thudOsc.start(t + 1.1);
    thudOsc.stop(t + 1.4);
  };
  useEffect(() => {
    if (masterGainRef.current && audioContext) masterGainRef.current.gain.setTargetAtTime(muted ? 0 : 1, audioContext.currentTime, 0.1);
  }, [muted, audioContext]);
  useEffect(() => {
    if (doorTrigger > 0 && audioContext && masterGainRef.current) {
      playDoorCloseSound(audioContext, masterGainRef.current);
      const now = audioContext.currentTime;
      crossfadeRef.current = { active: true, startTime: now, duration: 3, from: "lobby", to: "elevator" };
      tracksRef.current.elevator.active = true;
      tracksRef.current.elevator.volume = 0;
      tracksRef.current.elevator.nextNoteTime = now;
      tracksRef.current.elevator.beatCount = 0;
    }
  }, [doorTrigger, audioContext]);
  const schedulerRef = useRef(null);
  schedulerRef.current = () => {
    const ctx = audioContext;
    if (!ctx) return;
    const now = ctx.currentTime;
    if (crossfadeRef.current.active) {
      const { startTime, duration, from, to } = crossfadeRef.current;
      const elapsed = now - startTime;
      if (elapsed >= duration) {
        tracksRef.current[from].active = false;
        tracksRef.current[from].volume = 0;
        tracksRef.current[to].volume = 1;
        crossfadeRef.current.active = false;
      } else {
        const t = elapsed / duration;
        tracksRef.current[from].volume = 1 - t;
        tracksRef.current[to].volume = t;
      }
    }
    if (lobbyGainRef.current) lobbyGainRef.current.gain.setTargetAtTime(tracksRef.current.lobby.volume, now, 0.05);
    const elevatorTrack = tracksRef.current.elevator;
    if (barneyGainRef.current) {
      barneyGainRef.current.gain.setTargetAtTime(elevatorTrack.active ? elevatorTrack.volume * 0.7 : 0, now, 0.1);
    }
    if (elevatorTrack.active && !barneySourceRef.current && barneyBufferRef.current && barneyGainRef.current && barneyFilterRef.current) {
      const src = ctx.createBufferSource();
      src.buffer = barneyBufferRef.current;
      src.loop = true;
      src.connect(barneyFilterRef.current);
      src.start(0);
      barneySourceRef.current = src;
    }
    if (barneySourceRef.current && barneyFilterRef.current) {
      const distorted = distortModeRef.current;
      const targetRate = distorted ? 0.65 : 1;
      try {
        barneySourceRef.current.playbackRate.setTargetAtTime(targetRate, now, 0.5);
      } catch (e) {
      }
      try {
        if (barneySourceRef.current.detune) barneySourceRef.current.detune.setTargetAtTime(distorted ? -300 : 0, now, 0.5);
      } catch (e) {
      }
      try {
        barneyFilterRef.current.frequency.setTargetAtTime(distorted ? 1200 : 2e4, now, 0.3);
      } catch (e) {
      }
      try {
        barneyFilterRef.current.Q.setTargetAtTime(distorted ? 3 : 1, now, 0.3);
      } catch (e) {
      }
    }
    if (!elevatorTrack.active && barneySourceRef.current && barneyGainRef.current && barneyGainRef.current.gain.value < 0.01) {
      try {
        barneySourceRef.current.stop();
      } catch (e) {
      }
      try {
        barneySourceRef.current.disconnect();
      } catch (e) {
      }
      barneySourceRef.current = null;
    }
  };
  useEffect(() => {
    if (!audioContext) return;
    const ctx = audioContext;
    const compressor = ctx.createDynamicsCompressor();
    compressor.threshold.value = -12;
    compressor.ratio.value = 4;
    const makeupGain = ctx.createGain();
    makeupGain.gain.value = 2.5;
    compressor.connect(makeupGain);
    makeupGain.connect(ctx.destination);
    const reverbInput = setupReverb(ctx, compressor);
    masterGainRef.current = reverbInput;
    const lobbyGain = ctx.createGain();
    lobbyGain.gain.value = 1;
    lobbyGain.connect(reverbInput);
    lobbyGainRef.current = lobbyGain;
    const barneyGain = ctx.createGain();
    barneyGain.gain.value = 0;
    const barneyFilter = ctx.createBiquadFilter();
    barneyFilter.type = "lowpass";
    barneyFilter.frequency.value = 2e4;
    barneyFilter.Q.value = 1;
    barneyFilter.connect(barneyGain);
    barneyGain.connect(reverbInput);
    barneyGainRef.current = barneyGain;
    barneyFilterRef.current = barneyFilter;
    let isMounted = true;
    if (!sourceRef.current) {
      fetch("https://raw.githubusercontent.com/Felipe9272727/M-sica-pro-meu-jogo/main/Lobby%20Time(MP3_160K).mp3").then((r) => r.arrayBuffer()).then((b) => ctx.decodeAudioData(b)).then((audioBuf) => {
        if (!isMounted || sourceRef.current) return;
        const source = ctx.createBufferSource();
        source.buffer = audioBuf;
        source.loop = true;
        source.connect(lobbyGain);
        source.start(0);
        sourceRef.current = source;
        lobbyReadyRef.current = true;
      }).catch((e) => console.error("Error loading lobby music:", e));
    }
    if (!barneyBufferRef.current) {
      fetch("https://archive.org/download/barneysgreatesthits/Barney%20Theme%20Song.mp3").then((r) => r.arrayBuffer()).then((b) => ctx.decodeAudioData(b)).then((audioBuf) => {
        if (!isMounted) return;
        barneyBufferRef.current = audioBuf;
      }).catch((e) => console.error("Error loading Barney music:", e));
    }
    schedulerTimerRef.current = setInterval(() => {
      if (schedulerRef.current) schedulerRef.current();
    }, 100);
    return () => {
      isMounted = false;
      if (schedulerTimerRef.current) clearInterval(schedulerTimerRef.current);
      if (sourceRef.current) {
        try {
          sourceRef.current.stop();
        } catch (e) {
        }
        try {
          sourceRef.current.disconnect();
        } catch (e) {
        }
        sourceRef.current = null;
      }
      if (barneySourceRef.current) {
        try {
          barneySourceRef.current.stop();
        } catch (e) {
        }
        try {
          barneySourceRef.current.disconnect();
        } catch (e) {
        }
        barneySourceRef.current = null;
      }
      try {
        lobbyGain.disconnect();
      } catch (e) {
      }
      try {
        barneyGain.disconnect();
      } catch (e) {
      }
      try {
        barneyFilter.disconnect();
      } catch (e) {
      }
      try {
        reverbInput.disconnect();
      } catch (e) {
      }
      try {
        compressor.disconnect();
      } catch (e) {
      }
      try {
        makeupGain.disconnect();
      } catch (e) {
      }
    };
  }, [audioContext]);
  return null;
};
